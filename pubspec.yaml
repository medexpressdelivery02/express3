name: express3
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 2.1.4+14

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.7
  firebase_core: ^4.2.0
  shared_preferences: ^2.5.5
  fluttertoast: ^9.1.0
  cloud_firestore: ^6.2.0
  uuid: ^4.5.3
  dio: ^5.9.2
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.jpg"

flutter_native_splash:
  color: "#F4F7FC"
  android_12:
    image: assets/images/logo2.jpg
    icon_background_color: "#F4F7FC"

flutter:

  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
